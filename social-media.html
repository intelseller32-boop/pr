<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Social Media Page</title>\n    <style>\n        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }\n        .post { border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; }\n        .profile { display: flex; align-items: center; margin-bottom: 10px; }\n        .profile img { border-radius: 50%; width: 40px; height: 40px; margin-right: 10px; }\n        .likes-comments { display: flex; justify-content: space-between; }\n    </style>\n</head>\n<body>\n    <h1>Social Media Feed</h1>\n    <div id=\"posts\"></div>\n    <script>\n        const posts = [\n            { id: 1, user: { name: 'Alice', profilePic: 'https://via.placeholder.com/40' }, content: 'This is my first post!', likes: 5, comments: [\n                { user: 'Bob', text: 'Nice post!' },\n                { user: 'Charlie', text: 'I love this!' }\n            ] },\n            { id: 2, user: { name: 'Bob', profilePic: 'https://via.placeholder.com/40' }, content: 'Hello world!', likes: 3, comments: [] },\n        ];\n\n        function renderPosts() {\n            const postsContainer = document.getElementById('posts');\n            postsContainer.innerHTML = ''; // Clear the container\n            posts.forEach(post => {\n                const postDiv = document.createElement('div');\n                postDiv.className = 'post';\n                postDiv.innerHTML = `\n                    <div class='profile'>\n                        <img src=\"${post.user.profilePic}\" alt=\"Profile Picture\">\n                        <strong>${post.user.name}</strong>\n                    </div>\n                    <p>${post.content}</p>\n                    <div class='likes-comments'>\n                        <span>${post.likes} Likes</span>\n                        <button onclick=\"handleLike(${post.id})\">Like</button>\n                    </div>\n                    <div class='comments'>\n                        <h4>Comments:</h4>\n                        <ul>\n                            ${post.comments.map(comment => `\n                                <li><strong>${comment.user}</strong>: ${comment.text}</li>`).join('')}\n                        </ul>\n                    </div>\n                `;\n                postsContainer.appendChild(postDiv);\n            });\n        }\n\n        function handleLike(postId) {\n            const post = posts.find(p => p.id === postId);\n            if (post) {\n                post.likes++;\n                renderPosts();\n            }\n        }\n\n        renderPosts();\n    </script>\n</body>\n</html>
